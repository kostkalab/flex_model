name: flex_model_env
channels:
  - conda-forge
  - nvidia

dependencies:
  # Pin key packages that are incompatible across versions
  - python=3.12 
  - cuda-toolkit=12.9

  # Let mamba pick compatible versions for the rest
  - numpy
  - cxx-compiler
  - pip
  - pip:
    - --index-url https://download.pytorch.org/whl/cu129
    - torch==2.8.0
    - torchvision==0.23.0

#==========================================================================
#  - PIP INSTALLATIONS AFTER torch, because they need a different index-url
#==========================================================================
# 1. Create environment
# mamba env create -f environment.yml
#
# # 2. Activate it
# mamba activate flex_model_env
#
# # 3. Run post-install script
# bash install_pips.sh
#==========================================================================